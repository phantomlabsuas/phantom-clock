<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phantom Clock v{{VERSION}}</title>
  <style>
    /* --- Design tokens ----------------------------------------------- */
    :root {
      --bg:           transparent;
      --bg-saved:     #000000;   /* restore: change --bg to this */
      --panel:        #111418;
      --text:         #A9CAF8;
      --muted:        #606060;
      --accent:       #c0392b;
      --accent-hover: #e74c3c;
      --btn-bg:       #1e2228;
      --btn-border:   #2a2f38;
      --radius:       16px;
      --font:         Inter, 'Segoe UI', Arial, sans-serif;
      --h:            38px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      user-select: none;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg);
      font-family: var(--font);
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- Widget ------------------------------------------------------- */
    .widget {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      height: var(--h);
      padding: 5px 15px 5px 11px;
      background: var(--panel);
      border-radius: var(--radius);
    }

    /* --- Buttons ------------------------------------------------------ */
    .btn {
      flex-shrink: 0;
      width:  calc(var(--h) - 10px);
      height: calc(var(--h) - 10px);
      border-radius: 50%;
      border: 1px solid var(--btn-border);
      background: var(--btn-bg);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease, background 0.12s ease;
    }

    .btn:hover  { transform: scale(1.08); }
    .btn:active { transform: scale(0.93); }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
    }
    .btn.primary:hover {
      background: var(--accent-hover);
      border-color: var(--accent-hover);
    }

    .btn svg {
      width: 50%;
      height: 50%;
      fill: currentColor;
    }

    /* --- Time display ------------------------------------------------- */
    .time {
      font-variant-numeric: tabular-nums;
      font-weight: 400;
      letter-spacing: 0.02em;
      white-space: nowrap;
      color: var(--text);
      line-height: 1;
    }
  </style>
</head>
<body>

<div class="widget" id="widget">

  <button class="btn primary" id="playBtn" title="Play / Pause" aria-label="Play/Pause">
    <svg id="playIcon" viewBox="0 0 24 24">
      <path d="M8 5v14l11-7z"/>
    </svg>
  </button>

  <button class="btn" id="resetBtn" title="Reset" aria-label="Reset">
    <svg viewBox="0 0 24 24">
      <path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/>
    </svg>
  </button>

  <div class="time" id="timeDisplay">00:00:00.00</div>

</div>

<script>
  const CONFIG = {
    showCentiseconds: true,
    colors: {
      panel:       "#111418",
      text:        "#A9CAF8",
      accent:      "#c0392b",
      accentHover: "#e74c3c",
      btnBg:       "#1e2228",
      btnBorder:   "#2a2f38",
    }
  };

  const R = document.documentElement;
  R.style.setProperty("--panel",        CONFIG.colors.panel);
  R.style.setProperty("--text",         CONFIG.colors.text);
  R.style.setProperty("--accent",       CONFIG.colors.accent);
  R.style.setProperty("--accent-hover", CONFIG.colors.accentHover);
  R.style.setProperty("--btn-bg",       CONFIG.colors.btnBg);
  R.style.setProperty("--btn-border",   CONFIG.colors.btnBorder);

  const timeDisplay = document.getElementById("timeDisplay");
  const playBtn     = document.getElementById("playBtn");
  const playIcon    = document.getElementById("playIcon");
  const resetBtn    = document.getElementById("resetBtn");

  let running = false;
  let start   = 0;
  let accum   = 0;

  const pad = (v, n = 2) => String(v).padStart(n, "0");

  function elapsed() {
    return accum + (running ? performance.now() - start : 0);
  }

  function formatTime(ms) {
    const cs  = Math.floor((ms % 1000) / 10);
    const ss  = Math.floor(ms / 1000) % 60;
    const mm  = Math.floor(ms / 60000) % 60;
    const hh  = Math.floor(ms / 3600000);
    const base = pad(hh) + ":" + pad(mm) + ":" + pad(ss);
    return CONFIG.showCentiseconds ? base + "." + pad(cs) : base;
  }

  function fitFont() {
    const h = document.getElementById("widget").clientHeight;
    timeDisplay.style.fontSize = Math.round(h * 0.40) + "px";
  }

  function render() {
    timeDisplay.textContent = formatTime(elapsed());
  }

  function syncPlayIcon() {
    playIcon.innerHTML = running
      ? '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>'
      : '<path d="M8 5v14l11-7z"/>';
  }

  function togglePlay() {
    if (running) { accum = elapsed(); running = false; }
    else { start = performance.now(); running = true; }
    syncPlayIcon();
  }

  function resetSW() {
    running = false; start = 0; accum = 0;
    syncPlayIcon(); render();
  }

  playBtn.addEventListener("click", togglePlay);
  resetBtn.addEventListener("click", resetSW);
  window.addEventListener("resize", fitFont);

  fitFont(); render(); syncPlayIcon();
  setInterval(render, 50);
</script>
</body>
</html>
